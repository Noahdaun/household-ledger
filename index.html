<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>가계부</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #EDF2E9; color: #233022; }
  .num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  .ledger-title { font-family: 'Noto Serif KR', serif; }
  .row-line { border-bottom: 1px solid #C9DBC4; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #B7CDB0; border-radius: 4px; }
  input, select { font-family: inherit; }

  .header { background: #233022; color: #EDF2E9; padding: calc(20px + env(safe-area-inset-top)) 16px 20px; }
  .header-inner { max-width: 480px; margin: 0 auto; }
  .eyebrow { font-size: 12px; letter-spacing: 3px; opacity: 0.6; margin-bottom: 4px; }
  .h1 { font-size: 28px; margin: 0; font-weight: 700; }

  .container { max-width: 480px; margin: 0 auto; padding: 0 16px calc(110px + env(safe-area-inset-bottom)); }

  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; margin-bottom: 16px; }
  .nav-btn { background: #F5F8F2; border: 1px solid #C9DBC4; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #233022; font-size: 18px; }
  .month-label { font-size: 20px; font-weight: 700; }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .summary-card { background: #F5F8F2; border: 1px solid #C9DBC4; border-radius: 10px; padding: 12px 8px; }
  .summary-label { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .summary-value { font-size: 15px; font-weight: 700; word-break: break-all; }

  .panel { background: #F5F8F2; border: 1px solid #C9DBC4; border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
  .panel-title { padding: 12px 16px; font-size: 13px; font-weight: 700; color: #4A5B47; border-bottom: 1px solid #C9DBC4; }
  .cat-body { display: flex; align-items: center; gap: 16px; padding: 16px; }
  .cat-list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .cat-item { display: flex; align-items: center; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .cat-name { flex: 1; color: #4A5B47; }

  .tx-row { display: flex; align-items: center; padding: 10px 16px; gap: 10px; }
  .tx-date { width: 40px; font-size: 12px; color: #8A9986; flex-shrink: 0; }
  .tx-mid { flex: 1; min-width: 0; }
  .tx-cat { font-size: 14px; font-weight: 500; }
  .tx-memo { font-size: 12px; color: #8A9986; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-amt { font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .tx-del { background: none; border: none; color: #B7CDB0; cursor: pointer; padding: 4px; flex-shrink: 0; font-size: 16px; }
  .empty { padding: 32px 16px; text-align: center; color: #8A9986; font-size: 14px; }

  .fab { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; width: 58px; height: 58px; border-radius: 50%; background: #233022; color: #EDF2E9; border: none; box-shadow: 0 4px 14px rgba(35,48,34,0.35); cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; z-index: 40; }

  .overlay { position: fixed; inset: 0; background: rgba(35,48,34,0.45); display: none; align-items: flex-end; justify-content: center; z-index: 50; }
  .overlay.open { display: flex; }
  .sheet { background: #F5F8F2; border-radius: 16px 16px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .sheet-title { font-size: 18px; font-weight: 700; }
  .close-btn { background: none; border: none; cursor: pointer; color: #4A5B47; font-size: 22px; }

  .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 10px 0; border-radius: 8px; border: 1px solid #C9DBC4; background: transparent; color: #4A5B47; font-weight: 600; cursor: pointer; font-size: 14px; }
  .type-btn.active { border-color: #233022; background: #233022; color: #EDF2E9; }

  label.field-label { display: block; font-size: 12px; font-weight: 600; color: #4A5B47; margin-bottom: 4px; margin-top: 10px; }
  .field { width: 100%; padding: 12px; border: 1px solid #C9DBC4; border-radius: 8px; font-size: 16px; background: #fff; color: #233022; }
  .err { color: #B33F3F; font-size: 13px; margin-top: 6px; }
  .save-btn { width: 100%; padding: 13px 0; background: #233022; color: #EDF2E9; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="eyebrow">HOUSEHOLD LEDGER</div>
    <h1 class="h1 ledger-title">가계부</h1>
  </div>
</div>

<div class="container">
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">‹</button>
    <div class="month-label ledger-title" id="monthLabel"></div>
    <button class="nav-btn" id="nextMonth">›</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label" style="color:#2F855A;">▲ 수입</div>
      <div class="summary-value num" id="sumIncome" style="color:#2F855A;"></div>
    </div>
    <div class="summary-card">
      <div class="summary-label" style="color:#B33F3F;">▼ 지출</div>
      <div class="summary-value num" id="sumExpense" style="color:#B33F3F;"></div>
    </div>
    <div class="summary-card">
      <div class="summary-label" style="color:#233022;">◆ 잔액</div>
      <div class="summary-value num" id="sumBalance" style="color:#233022; font-size:17px;"></div>
    </div>
  </div>

  <div class="panel" id="catPanel" style="display:none;">
    <div class="panel-title">카테고리별 지출</div>
    <div class="cat-body">
      <div class="cat-list" id="catList"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" id="txCount">내역 (0)</div>
    <div id="txList"></div>
  </div>
</div>

<button class="fab" id="openForm">+</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title ledger-title">내역 추가</div>
      <button class="close-btn" id="closeForm">×</button>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" data-type="expense">지출</button>
      <button class="type-btn" data-type="income">수입</button>
    </div>

    <label class="field-label">날짜</label>
    <input type="date" class="field" id="fDate">

    <label class="field-label">카테고리</label>
    <select class="field" id="fCategory"></select>

    <label class="field-label">금액</label>
    <input type="number" inputmode="numeric" placeholder="0" class="field num" id="fAmount">

    <label class="field-label">메모 (선택)</label>
    <input type="text" placeholder="예: 점심 식사" class="field" id="fMemo">

    <div class="err" id="fError" style="display:none;"></div>

    <button class="save-btn" id="saveBtn">저장</button>
  </div>
</div>

<script>
const EXPENSE_CATS = [
  { name: '식비', color: '#B33F3F' },
  { name: '교통', color: '#C97C3D' },
  { name: '주거/관리비', color: '#8B6BAE' },
  { name: '통신', color: '#4A7FA5' },
  { name: '의료/건강', color: '#3D8B6E' },
  { name: '문화/여가', color: '#B08A3E' },
  { name: '교육', color: '#5B6E8C' },
  { name: '저축/투자', color: '#2F855A' },
  { name: '기타', color: '#7A7A6E' },
];
const INCOME_CATS = [
  { name: '급여', color: '#2F855A' },
  { name: '부수입', color: '#3D8B6E' },
  { name: '기타', color: '#7A7A6E' },
];

const pad = n => String(n).padStart(2, '0');
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const won = n => `${Math.round(n).toLocaleString('ko-KR')}원`;
const STORE_KEY = 'speakinggym_ledger_transactions';

let transactions = [];
try { transactions = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) { transactions = []; }

let cursor = (() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth()+1 }; })();
let formType = 'expense';

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(transactions)); }

function monthTx() {
  const key = `${cursor.y}-${pad(cursor.m)}`;
  return transactions.filter(t => t.date.startsWith(key)).sort((a,b) => a.date < b.date ? 1 : -1);
}

function populateCategorySelect() {
  const sel = document.getElementById('fCategory');
  const cats = formType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  sel.innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
}

function render() {
  document.getElementById('monthLabel').textContent = `${cursor.y}년 ${cursor.m}월`;
  const list = monthTx();

  let income = 0, expense = 0;
  list.forEach(t => t.type === 'income' ? income += t.amount : expense += t.amount);
  const balance = income - expense;

  document.getElementById('sumIncome').textContent = won(income);
  document.getElementById('sumExpense').textContent = won(expense);
  document.getElementById('sumBalance').textContent = (balance < 0 ? '-' : '') + won(Math.abs(balance));

  // category breakdown
  const map = {};
  list.filter(t => t.type === 'expense').forEach(t => { map[t.category] = (map[t.category]||0) + t.amount; });
  const catData = Object.entries(map).map(([name,value]) => ({
    name, value, color: (EXPENSE_CATS.find(c => c.name===name)||{}).color || '#7A7A6E'
  })).sort((a,b) => b.value - a.value);

  const catPanel = document.getElementById('catPanel');
  const catList = document.getElementById('catList');
  if (catData.length > 0) {
    catPanel.style.display = 'block';
    const maxVal = catData[0].value;
    catList.innerHTML = catData.map(c => `
      <div class="cat-item">
        <span class="dot" style="background:${c.color};"></span>
        <span class="cat-name">${c.name}</span>
        <span class="num" style="font-weight:600;">${won(c.value)}</span>
      </div>
      <div style="height:5px; background:#E3ECE0; border-radius:3px; overflow:hidden; margin:-2px 0 4px;">
        <div style="height:100%; width:${(c.value/maxVal*100).toFixed(0)}%; background:${c.color};"></div>
      </div>
    `).join('');
  } else {
    catPanel.style.display = 'none';
  }

  // transaction list
  document.getElementById('txCount').textContent = `내역 (${list.length})`;
  const txList = document.getElementById('txList');
  if (list.length === 0) {
    txList.innerHTML = `<div class="empty">이번 달 기록이 없어요. 아래 + 버튼으로 첫 내역을 추가해 보세요.</div>`;
  } else {
    txList.innerHTML = list.map(t => `
      <div class="tx-row row-line">
        <div class="tx-date">${t.date.slice(8,10)}일</div>
        <div class="tx-mid">
          <div class="tx-cat">${t.category}</div>
          ${t.memo ? `<div class="tx-memo">${escapeHtml(t.memo)}</div>` : ''}
        </div>
        <div class="tx-amt num" style="color:${t.type==='income'?'#2F855A':'#B33F3F'};">${t.type==='income'?'+':'-'}${won(t.amount)}</div>
        <button class="tx-del" data-id="${t.id}">🗑</button>
      </div>
    `).join('');
    txList.querySelectorAll('.tx-del').forEach(btn => {
      btn.addEventListener('click', () => {
        transactions = transactions.filter(t => t.id !== btn.dataset.id);
        save(); render();
      });
    });
  }
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

document.getElementById('prevMonth').addEventListener('click', () => {
  cursor.m -= 1; if (cursor.m < 1) { cursor.m = 12; cursor.y -= 1; }
  render();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  cursor.m += 1; if (cursor.m > 12) { cursor.m = 1; cursor.y += 1; }
  render();
});

const overlay = document.getElementById('overlay');
document.getElementById('openForm').addEventListener('click', () => {
  document.getElementById('fDate').value = todayStr();
  document.getElementById('fAmount').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('fError').style.display = 'none';
  overlay.classList.add('open');
});
document.getElementById('closeForm').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    formType = btn.dataset.type;
    populateCategorySelect();
  });
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const date = document.getElementById('fDate').value;
  const category = document.getElementById('fCategory').value;
  const amount = Number(document.getElementById('fAmount').value);
  const memo = document.getElementById('fMemo').value.trim();
  const errEl = document.getElementById('fError');

  if (!date) { errEl.textContent = '날짜를 입력해 주세요.'; errEl.style.display = 'block'; return; }
  if (!amount || amount <= 0) { errEl.textContent = '금액을 올바르게 입력해 주세요.'; errEl.style.display = 'block'; return; }

  transactions.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), date, type: formType, category, amount, memo });
  save();
  overlay.classList.remove('open');
  render();
});

populateCategorySelect();
render();
</script>
</body>
</html>
